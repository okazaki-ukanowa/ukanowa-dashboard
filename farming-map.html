<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うかのわ 営農マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD5;
  --border2: #CCC8C0;
  --text: #1A1816;
  --text2: #6B6560;
  --text3: #9B958E;
  --green-bg: #E8F4E8;
  --green-text: #2D6A2D;
  --green-border: #A8D4A8;
  --amber-bg: #FDF3E0;
  --amber-text: #8A5C00;
  --accent: #2D6A2D;
  --radius: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
}

/* ── Layout: sidebar + map ── */
.app-layout {
  display: flex;
  height: 100vh;
}
.sidebar {
  width: 310px;
  min-width: 310px;
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
}
.map-area {
  flex: 1;
  position: relative;
}
#map { width: 100%; height: 100%; }

/* ── Sidebar header ── */
.sb-header {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 2px;
}
.sb-title {
  font-size: 18px;
  font-weight: 600;
}

/* ── Progress bar ── */
.progress-section {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.progress-label {
  font-size: 11px;
  color: var(--text3);
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}
.progress-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* ── Action buttons ── */
.sb-actions {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 5px 10px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface2); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #245a24; }
.btn-sm { font-size: 10px; padding: 4px 8px; }

/* ── Farm list (scrollable) ── */
.sb-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.75rem;
}

/* ── Farm card ── */
.farm-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.farm-card:hover { border-color: var(--accent); }
.farm-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.farm-card-name { font-weight: 600; font-size: 13px; }
.farm-card-color {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.1);
  flex-shrink: 0;
}
.farm-card-meta {
  font-size: 10px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}
.farm-card-mowing {
  font-size: 10px;
  color: var(--green-text);
  margin-top: 4px;
}

/* ── Detail panel (replaces list) ── */
.sb-detail {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: none;
}
.sb-detail.active { display: block; }
.sb-list.hidden { display: none; }
.detail-back {
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  margin-bottom: 12px;
  font-family: 'Noto Sans JP', sans-serif;
}
.detail-back:hover { color: var(--text); }
.detail-name {
  width: 100%;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-bottom: 1.5px solid var(--border);
  padding: 4px 0;
  margin-bottom: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
  color: var(--text);
}
.detail-name:focus { outline: none; border-color: var(--accent); }
.detail-link {
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  display: inline-block;
  margin-bottom: 12px;
}
.detail-link:hover { text-decoration: underline; }
.detail-section-title {
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 4px;
  margin-top: 12px;
}
.detail-memo {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  resize: vertical;
  min-height: 60px;
  background: var(--surface2);
  color: var(--text);
}
.detail-memo:focus { outline: none; border-color: var(--accent); background: var(--surface); }
.mowing-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  font-size: 12px;
}
.mowing-item input[type="checkbox"] { accent-color: var(--accent); }
.mowing-item.done { color: var(--text3); text-decoration: line-through; }

/* ── Dialog ── */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.dialog-overlay.active { opacity: 1; pointer-events: all; }
.dialog {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  width: 90%;
  max-width: 380px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.dialog h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.dialog label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
.dialog input[type="text"], .dialog textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 12px;
}
.dialog input:focus, .dialog textarea:focus { outline: none; border-color: var(--accent); }
.dialog-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* ── Color Picker ── */
.color-picker { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s;
}
.color-swatch.selected { border-color: var(--text); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 3000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Responsive: mobile ── */
@media (max-width: 700px) {
  .app-layout {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    min-width: 100%;
    height: 52vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .map-area {
    height: 48vh;
  }
}
</style>
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Header -->
    <div class="sb-header">
      <div class="sb-label">UKANOWA / 営農管理</div>
      <div class="sb-title">圃場マップ</div>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-label">
        <span id="progressText">読み込み中...</span>
        <span id="progressPct"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="sb-actions">
      <label class="btn btn-primary" style="margin:0;cursor:pointer">
        + 筆ポリゴン読込
        <input type="file" id="geojsonInput" accept=".geojson,.json" style="display:none" onchange="loadGeoJSON(event)">
      </label>
      <button class="btn" onclick="fitAllFarms()">全体表示</button>
      <button class="btn" id="btnToggleFude" onclick="toggleFudePolygons()" style="display:none">筆を非表示</button>
      <button class="btn btn-sm" onclick="showFudeHelp()">?</button>
    </div>

    <!-- Farm List -->
    <div class="sb-list" id="farmList">
      <div style="text-align:center; padding:2rem; color:var(--text3);">読み込み中...</div>
    </div>

    <!-- Detail Panel -->
    <div class="sb-detail" id="farmDetail"></div>
  </div>

  <!-- Map -->
  <div class="map-area">
    <div id="map"></div>
  </div>
</div>

<!-- Register Dialog -->
<div class="dialog-overlay" id="registerDialog">
  <div class="dialog">
    <h3>圃場を登録</h3>
    <label>圃場名</label>
    <input type="text" id="farmName" placeholder="例: 田んぼA">
    <label>色</label>
    <div class="color-picker" id="colorPicker"></div>
    <label>注意事項・メモ</label>
    <textarea id="farmNote" rows="3" placeholder="水路が近い、など"></textarea>
    <div class="dialog-actions">
      <button class="btn" onclick="closeRegisterDialog()">キャンセル</button>
      <button class="btn btn-primary" onclick="registerFarm()">登録</button>
    </div>
  </div>
</div>

<!-- Fude Help Dialog -->
<div class="dialog-overlay" id="fudeHelpDialog">
  <div class="dialog" style="max-width:440px">
    <h3>筆ポリゴンの取得方法</h3>
    <div style="font-size:13px; line-height:1.8; color:var(--text2)">
      <p style="margin-bottom:8px">農林水産省の筆ポリゴンデータ（GeoJSON）をダウンロードして読み込みます。</p>
      <ol style="padding-left:1.2em; margin-bottom:12px">
        <li><a href="https://open.fude.maff.go.jp" target="_blank" rel="noopener" style="color:var(--accent)">筆ポリゴンデータダウンロード</a>にアクセス</li>
        <li>都道府県「愛媛県」→ 市区町村「松山市」を選択</li>
        <li>GeoJSON形式でダウンロード</li>
        <li>本ページの「筆ポリゴン読込」ボタンでファイルを選択</li>
      </ol>
      <p style="font-size:11px; color:var(--text3);">※ファイルサイズが大きい場合、読み込みに数秒かかることがあります</p>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeFudeHelp()">閉じる</button>
      <a href="https://open.fude.maff.go.jp" target="_blank" rel="noopener" class="btn btn-primary" style="text-decoration:none">ダウンロードサイトへ</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── Config ───
const WORKER_URL = 'https://ukanowa-api.commonground-oka.workers.dev';
const FARM_DB_ID = '63a14967d0fa42e997ba81e2e0d0b532';
const MOWING_DB_ID = 'ab48bde332f1468ca0ba73630c8166bc';

const DEFAULT_CENTER = [33.835, 132.815];
const DEFAULT_ZOOM = 16;

const FARM_COLORS = [
  '#4CAF50', '#2196F3', '#FF9800', '#9C27B0',
  '#F44336', '#00BCD4', '#8BC34A', '#FF5722',
  '#3F51B5', '#CDDC39'
];

// ─── State ───
let map;
let fudeLayer = null;
let fudeVisible = false;
let farmLayers = {};
let farmData = [];
let pendingGeometry = null;
let selectedColor = FARM_COLORS[0];
let memoTimers = {};
let currentDetailId = null;

// ─── Map Init ───
function initMap() {
  map = L.map('map', { zoomControl: true }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18
  }).addTo(map);

  loadFarmsFromNotion();
}

// ─── Notion API helpers ───
async function notionQuery(dbId, body = {}) {
  const url = `${WORKER_URL}/databases/${dbId}/query`;
  console.log('[Notion] query:', url);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.text().catch(() => '');
    console.error(`[Notion] query failed (${res.status}):`, err);
    throw new Error(`Notion query failed: ${res.status} - ${err}`);
  }
  return res.json();
}

async function notionCreate(dbId, properties) {
  const url = `${WORKER_URL}/pages`;
  console.log('[Notion] create page in DB:', dbId);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      parent: { database_id: dbId },
      properties
    })
  });
  if (!res.ok) {
    const err = await res.text().catch(() => '');
    console.error(`[Notion] create failed (${res.status}):`, err);
    throw new Error(`Notion create failed: ${res.status} - ${err}`);
  }
  return res.json();
}

async function notionUpdate(pageId, properties) {
  const url = `${WORKER_URL}/pages/${pageId}`;
  console.log('[Notion] update page:', pageId);
  const res = await fetch(url, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ properties })
  });
  if (!res.ok) {
    const err = await res.text().catch(() => '');
    console.error(`[Notion] update failed (${res.status}):`, err);
    throw new Error(`Notion update failed: ${res.status} - ${err}`);
  }
  return res.json();
}

// ─── Load Farms from Notion ───
async function loadFarmsFromNotion() {
  try {
    const data = await notionQuery(FARM_DB_ID);
    farmData = [];
    const results = data.results || [];

    for (const page of results) {
      const props = page.properties || {};
      const farm = {
        id: page.id,
        name: extractText(props['圃場名'] || props['Name'] || props['名前']),
        color: extractText(props['色'] || props['Color']),
        note: extractText(props['注意事項'] || props['メモ'] || props['Notes']),
        geometry: null,
        mowingPoints: []
      };

      const coordProp = props['座標JSON'] || props['座標'] || props['Coordinates'];
      if (coordProp) {
        const coordText = extractText(coordProp);
        if (coordText) {
          try { farm.geometry = JSON.parse(coordText); }
          catch (e) { console.warn('座標JSONパース失敗:', farm.name, e); }
        }
      }

      if (farm.geometry) farmData.push(farm);
    }

    await loadMowingPoints();
    drawFarms();
    renderFarmList();
    updateProgress();
    showToast(`${farmData.length}件の圃場を読み込みました`);
  } catch (e) {
    console.error('圃場読み込みエラー:', e);
    showToast('圃場データの読み込みに失敗しました');
    renderFarmList();
    updateProgress();
  }
}

async function loadMowingPoints() {
  try {
    const data = await notionQuery(MOWING_DB_ID);
    const results = data.results || [];

    for (const page of results) {
      const props = page.properties || {};
      const farmRel = props['圃場'] || props['Farm'];
      const farmIds = extractRelation(farmRel);
      const point = {
        id: page.id,
        name: extractText(props['名前'] || props['Name'] || props['ポイント名']),
        done: extractCheckbox(props['完了'] || props['Done'] || props['ステータス']),
        farmId: farmIds[0] || null
      };

      if (point.farmId) {
        const farm = farmData.find(f => f.id === point.farmId);
        if (farm) farm.mowingPoints.push(point);
      }
    }
  } catch (e) {
    console.warn('草刈りポイント読み込みエラー:', e);
  }
}

// ─── Notion property extractors ───
function extractText(prop) {
  if (!prop) return '';
  if (prop.title) return prop.title.map(t => t.plain_text || '').join('');
  if (prop.rich_text) return prop.rich_text.map(t => t.plain_text || '').join('');
  if (prop.select) return prop.select?.name || '';
  if (prop.number !== undefined) return String(prop.number);
  return '';
}

function extractRelation(prop) {
  if (!prop || !prop.relation) return [];
  return prop.relation.map(r => r.id);
}

function extractCheckbox(prop) {
  if (!prop) return false;
  if (prop.checkbox !== undefined) return prop.checkbox;
  if (prop.select) return prop.select?.name === '完了';
  return false;
}

// ─── Progress ───
function updateProgress() {
  const total = farmData.length;
  const allPoints = farmData.flatMap(f => f.mowingPoints);
  const done = allPoints.filter(p => p.done).length;
  const totalPts = allPoints.length;
  const pct = totalPts > 0 ? Math.round((done / totalPts) * 100) : 0;

  document.getElementById('progressText').textContent =
    totalPts > 0 ? `草刈り完了 ${done}/${totalPts} ポイント（${total}圃場）`
                 : `${total}圃場を管理中`;
  document.getElementById('progressPct').textContent = totalPts > 0 ? `${pct}%` : '';
  document.getElementById('progressFill').style.width = `${pct}%`;
}

// ─── Draw Farms on Map ───
function drawFarms() {
  Object.values(farmLayers).forEach(layer => map.removeLayer(layer));
  farmLayers = {};

  for (const farm of farmData) {
    if (!farm.geometry) continue;

    let coords;
    if (farm.geometry.type === 'Polygon') {
      coords = farm.geometry.coordinates[0].map(c => [c[1], c[0]]);
    } else if (Array.isArray(farm.geometry[0])) {
      coords = farm.geometry.map(c => Array.isArray(c[0]) ? [c[0][1], c[0][0]] : [c[1], c[0]]);
    } else {
      coords = farm.geometry;
    }

    const color = farm.color || FARM_COLORS[0];
    const polygon = L.polygon(coords, {
      color: color,
      fillColor: color,
      fillOpacity: 0.35,
      weight: 2
    }).addTo(map);

    polygon.bindTooltip(farm.name, { permanent: false, direction: 'center' });

    polygon.on('click', () => showDetail(farm.id));

    farmLayers[farm.id] = polygon;
  }
}

// ─── Fit all farms ───
function fitAllFarms() {
  const layers = Object.values(farmLayers);
  if (layers.length === 0) {
    map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
    return;
  }
  const group = L.featureGroup(layers);
  map.fitBounds(group.getBounds(), { padding: [30, 30] });
}

// ─── Fude Polygon (GeoJSON) ───
function toggleFudePolygons() {
  if (fudeVisible && fudeLayer) {
    map.removeLayer(fudeLayer);
    fudeLayer = null;
    fudeVisible = false;
    document.getElementById('btnToggleFude').style.display = 'none';
    showToast('筆ポリゴンを非表示にしました');
  }
}

function showFudeHelp() {
  document.getElementById('fudeHelpDialog').classList.add('active');
}
function closeFudeHelp() {
  document.getElementById('fudeHelpDialog').classList.remove('active');
}

function displayFudePolygons(geojson) {
  if (fudeLayer) map.removeLayer(fudeLayer);

  const registeredGeometries = farmData
    .filter(f => f.geometry)
    .map(f => JSON.stringify(f.geometry));

  fudeLayer = L.geoJSON(geojson, {
    filter: (feature) => !registeredGeometries.includes(JSON.stringify(feature.geometry)),
    style: { color: '#999', fillColor: '#ccc', fillOpacity: 0.25, weight: 1.5 },
    onEachFeature: (feature, layer) => {
      layer.on('click', () => onFudeClick(feature, layer));
      layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.5, color: '#666', weight: 2 }));
      layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.25, color: '#999', weight: 1.5 }));
    }
  }).addTo(map);
}

function loadGeoJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const geojson = JSON.parse(e.target.result);
      if (geojson.type === 'FeatureCollection' && geojson.features) {
        displayFudePolygons(geojson);
        fudeVisible = true;
        const btn = document.getElementById('btnToggleFude');
        btn.style.display = '';
        btn.textContent = '筆を非表示';
        showToast(`${geojson.features.length}件の筆ポリゴンを読み込みました`);
        if (fudeLayer) map.fitBounds(fudeLayer.getBounds(), { padding: [30, 30] });
      } else {
        showToast('有効なGeoJSONファイルではありません');
      }
    } catch (err) {
      showToast('ファイルの読み込みに失敗しました');
      console.error(err);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Farm Registration ───
function onFudeClick(feature, layer) {
  pendingGeometry = feature.geometry;
  selectedColor = FARM_COLORS[Math.floor(Math.random() * FARM_COLORS.length)];
  document.getElementById('farmName').value = '';
  document.getElementById('farmNote').value = '';
  renderColorPicker();
  document.getElementById('registerDialog').classList.add('active');
}

function renderColorPicker() {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = FARM_COLORS.map(c =>
    `<div class="color-swatch ${c === selectedColor ? 'selected' : ''}"
          style="background:${c}"
          onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(color) {
  selectedColor = color;
  renderColorPicker();
}

function closeRegisterDialog() {
  document.getElementById('registerDialog').classList.remove('active');
  pendingGeometry = null;
}

async function registerFarm() {
  const name = document.getElementById('farmName').value.trim();
  if (!name) { showToast('圃場名を入力してください'); return; }
  if (!pendingGeometry) { showToast('ポリゴンが選択されていません'); return; }

  const note = document.getElementById('farmNote').value.trim();
  const geometryJson = JSON.stringify(pendingGeometry);

  closeRegisterDialog();
  showToast('登録中...');

  try {
    const properties = {
      '圃場名': { title: [{ text: { content: name } }] },
      '色': { rich_text: [{ text: { content: selectedColor } }] },
      '座標JSON': { rich_text: [{ text: { content: geometryJson } }] }
    };
    if (note) {
      properties['注意事項'] = { rich_text: [{ text: { content: note } }] };
    }

    const result = await notionCreate(FARM_DB_ID, properties);
    const newFarm = {
      id: result.id, name, color: selectedColor, note,
      geometry: pendingGeometry, mowingPoints: []
    };
    farmData.push(newFarm);

    drawFarms();
    renderFarmList();
    updateProgress();
    showToast(`「${name}」を登録しました`);
    pendingGeometry = null;
  } catch (e) {
    console.error('圃場登録エラー:', e);
    showToast('登録に失敗しました');
  }
}

// ─── Farm List ───
function renderFarmList() {
  const container = document.getElementById('farmList');
  if (farmData.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text3);">圃場が登録されていません<br><small>筆ポリゴンを読み込んでクリック→登録</small></div>';
    return;
  }

  container.innerHTML = farmData.map(farm => {
    const done = farm.mowingPoints.filter(p => p.done).length;
    const total = farm.mowingPoints.length;
    const mowingStr = total > 0 ? `草刈り ${done}/${total}` : '';

    return `
      <div class="farm-card" onclick="showDetail('${farm.id}')">
        <div class="farm-card-header">
          <span class="farm-card-name">${esc(farm.name)}</span>
          <div class="farm-card-color" style="background:${farm.color || FARM_COLORS[0]}"></div>
        </div>
        ${farm.note ? `<div class="farm-card-meta">${esc(farm.note.substring(0, 40))}${farm.note.length > 40 ? '...' : ''}</div>` : ''}
        ${mowingStr ? `<div class="farm-card-mowing">${mowingStr}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ─── Detail Panel ───
function showDetail(farmId) {
  const farm = farmData.find(f => f.id === farmId);
  if (!farm) return;
  currentDetailId = farmId;

  // Fly to farm on map
  const layer = farmLayers[farmId];
  if (layer) map.fitBounds(layer.getBounds(), { padding: [50, 50] });

  // Compute center for Google Maps link
  let centerLat = DEFAULT_CENTER[0], centerLng = DEFAULT_CENTER[1];
  if (layer) {
    const c = layer.getBounds().getCenter();
    centerLat = c.lat;
    centerLng = c.lng;
  }

  const mowingHtml = farm.mowingPoints.length > 0
    ? `<div class="detail-section-title">草刈りポイント</div>
       ${farm.mowingPoints.map(mp => `
         <div class="mowing-item ${mp.done ? 'done' : ''}">
           <input type="checkbox" ${mp.done ? 'checked' : ''}
                  onchange="toggleMowing('${mp.id}', this.checked)">
           <span>${esc(mp.name)}</span>
         </div>
       `).join('')}`
    : '';

  document.getElementById('farmDetail').innerHTML = `
    <button class="detail-back" onclick="hideDetail()">← 圃場一覧に戻る</button>
    <input class="detail-name" value="${esc(farm.name)}"
           onchange="renameFarm('${farm.id}', this.value)">
    <a class="detail-link" href="https://www.google.com/maps?q=${centerLat},${centerLng}" target="_blank" rel="noopener">
      Google マップで開く ↗
    </a>
    <div class="detail-section-title">注意事項・メモ</div>
    <textarea class="detail-memo"
              oninput="debounceMemo('${farm.id}', this.value)">${esc(farm.note || '')}</textarea>
    ${mowingHtml}
  `;

  document.getElementById('farmList').classList.add('hidden');
  document.getElementById('farmDetail').classList.add('active');
}

function hideDetail() {
  currentDetailId = null;
  document.getElementById('farmDetail').classList.remove('active');
  document.getElementById('farmList').classList.remove('hidden');
}

// ─── Rename Farm ───
async function renameFarm(farmId, newName) {
  const farm = farmData.find(f => f.id === farmId);
  if (!farm || !newName.trim()) return;
  farm.name = newName.trim();
  renderFarmList();
  drawFarms();

  try {
    await notionUpdate(farmId, {
      '圃場名': { title: [{ text: { content: farm.name } }] }
    });
  } catch (e) {
    console.error('圃場名更新エラー:', e);
    showToast('圃場名の保存に失敗しました');
  }
}

// ─── Mowing Checkbox ───
async function toggleMowing(pointId, done) {
  try {
    await notionUpdate(pointId, { '完了': { checkbox: done } });
    for (const farm of farmData) {
      const mp = farm.mowingPoints.find(p => p.id === pointId);
      if (mp) { mp.done = done; break; }
    }
    updateProgress();
    if (currentDetailId) showDetail(currentDetailId);
    renderFarmList();
  } catch (e) {
    console.error('草刈りステータス更新エラー:', e);
    showToast('ステータス更新に失敗しました');
  }
}

// ─── Memo Debounce ───
function debounceMemo(farmId, value) {
  if (memoTimers[farmId]) clearTimeout(memoTimers[farmId]);
  memoTimers[farmId] = setTimeout(() => saveMemo(farmId, value), 1000);
}

async function saveMemo(farmId, value) {
  const farm = farmData.find(f => f.id === farmId);
  if (!farm) return;
  farm.note = value;
  renderFarmList();

  try {
    await notionUpdate(farmId, {
      '注意事項': { rich_text: [{ text: { content: value } }] }
    });
  } catch (e) {
    console.error('メモ保存エラー:', e);
    showToast('メモの保存に失敗しました');
  }
}

// ─── Utilities ───
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function esc(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ─── Init ───
document.addEventListener('DOMContentLoaded', initMap);
</script>
</body>
</html>
