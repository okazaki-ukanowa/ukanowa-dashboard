<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うかのわ ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { padding: 24px 40px 0; display: flex; justify-content: space-between; align-items: flex-start; }
    .header-left .breadcrumb { font-size: 11px; letter-spacing: 0.08em; color: #888; text-transform: uppercase; margin-bottom: 6px; }
    .header-left h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
    .header-right { font-size: 12px; color: #888; text-align: right; padding-top: 4px; }
    .divider { margin: 20px 40px 0; border: none; border-top: 1px solid #e0e0e0; }

    /* Main */
    .main { flex: 1; padding: 32px 40px; }
    .section-label { font-size: 11px; letter-spacing: 0.1em; color: #888; text-transform: uppercase; margin-bottom: 20px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    /* Card */
    .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 6px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
    .status-badge { font-size: 10px; white-space: nowrap; padding: 2px 8px; border-radius: 3px; font-weight: 500; flex-shrink: 0; }
    .status-active { background: #fff3e0; color: #e65100; }
    .status-wait   { background: #f3f3f3; color: #888; }
    .status-block  { background: #fdecea; color: #c62828; }
    .next-action { font-size: 12px; color: #555; line-height: 1.6; flex: 1; }
    .card-footer { margin-top: auto; }
    .open-btn { display: inline-block; font-size: 11px; font-weight: 500; color: #1a1a1a; text-decoration: none; letter-spacing: 0.04em; border-bottom: 1px solid #1a1a1a; padding-bottom: 1px; }
    .open-btn:hover { color: #555; border-color: #555; }
    .open-btn.disabled { color: #bbb; border-color: #bbb; pointer-events: none; }
    .loading { color: #bbb; font-size: 12px; }
    .error { color: #c62828; font-size: 12px; }

    /* Footer */
    .footer { padding: 20px 40px; border-top: 1px solid #e0e0e0; font-size: 11px; color: #aaa; display: flex; gap: 16px; }

    /* ── スマホ対応 ── */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .header { padding: 20px 16px 0; flex-direction: column; gap: 4px; }
      .header-right { text-align: left; }
      .divider { margin: 16px 16px 0; }
      .main { padding: 24px 16px; }
      .header-left h1 { font-size: 20px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 16px; }
      .footer { padding: 16px; flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="breadcrumb">UKANOWA / 岡崎仁志</div>
    <h1>プロジェクト一覧</h1>
  </div>
  <div class="header-right">
    <div id="update-date">読み込み中...</div>
  </div>
</div>
<hr class="divider">

<div class="main">
  <div class="section-label">PROJECTS — 全プロジェクト状況</div>
  <div class="grid" id="grid"></div>
</div>

<div class="footer">
  <span>うかのわ</span>
  <span>愛媛県松山市久米窪田町294-1</span>
  <span>090-2695-9411</span>
</div>

<script>
const API_BASE = 'https://ukanowa-api.commonground-oka.workers.dev';

const PROJECTS = [
  { key: '引き継ぎ管理',   label: '🗂️ 引き継ぎ管理',   file: 'hikitsugi.html' },
  { key: '経営管理',       label: '📊 経営管理・戦略', file: null },
  { key: 'システム開発',   label: '⚙️ システム開発',   file: 'system.html' },
  { key: '生産管理',       label: '🌾 生産管理',       file: 'seisan.html' },
  { key: '販売・業務管理', label: '🛒 販売・業務管理', file: 'hanbai.html' },
  { key: '輸出',           label: '✈️ 輸出',           file: 'yushutsu.html' },
  { key: '経理',           label: '💰 経理',           file: 'keiri.html' },
];

function statusClass(s) {
  if (!s) return 'status-wait';
  if (s.includes('進行')) return 'status-active';
  if (s.includes('ブロック') || s.includes('停止')) return 'status-block';
  return 'status-wait';
}

function statusLabel(s) {
  if (!s) return '—';
  return s.replace(/^[🔥⏸️🚫]+\s*/, '');
}

function firstLine(text) {
  if (!text) return '—';
  const line = text.split('\n').find(l => l.trim()) || '';
  return line.length > 60 ? line.slice(0, 60) + '…' : line || '—';
}

function renderCard(pj, data, err) {
  const base = location.href.replace(/[^/]*$/, '');
  const href = pj.file ? base + pj.file : null;
  const btnHtml = href
    ? `<a class="open-btn" href="${href}">開く →</a>`
    : `<span class="open-btn disabled">準備中</span>`;

  if (err) {
    return `<div class="card">
      <div class="card-header"><span class="card-title">${pj.label}</span></div>
      <div class="error">取得失敗</div>
      <div class="card-footer">${btnHtml}</div>
    </div>`;
  }

  const badge = `<span class="status-badge ${statusClass(data.status)}">${statusLabel(data.status)}</span>`;
  const next  = `<div class="next-action">${firstLine(data.next_action)}</div>`;

  return `<div class="card">
    <div class="card-header"><span class="card-title">${pj.label}</span>${badge}</div>
    ${next}
    <div class="card-footer">${btnHtml}</div>
  </div>`;
}

async function fetchContext(key) {
  const res = await fetch(`${API_BASE}/context?pj=${encodeURIComponent(key)}`);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function main() {
  const grid = document.getElementById('grid');
  grid.innerHTML = PROJECTS.map(() => `<div class="card"><span class="loading">読み込み中...</span></div>`).join('');

  const results = await Promise.allSettled(PROJECTS.map(p => fetchContext(p.key)));

  let latest = null;
  grid.innerHTML = PROJECTS.map((pj, i) => {
    const r = results[i];
    if (r.status === 'fulfilled') {
      if (!latest) latest = r.value.as_of;
      return renderCard(pj, r.value, false);
    } else {
      return renderCard(pj, null, true);
    }
  }).join('');

  if (latest) {
    const d = new Date(latest);
    document.getElementById('update-date').textContent =
      '更新日：' + d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
  }
}

main();
</script>
</body>
</html>
