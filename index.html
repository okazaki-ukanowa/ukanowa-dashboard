<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うかのわ ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD5;--border2:#CCC8C0;
  --text:#1A1816;--text2:#6B6560;--text3:#9B958E;
  --green-bg:#E8F4E8;--green-text:#2D6A2D;--green-border:#A8D4A8;
  --amber-bg:#FDF3E0;--amber-text:#8A5C00;--amber-border:#F0CC80;
  --accent:#2D6A2D;--radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.page{max-width:720px;margin:0 auto;padding:3rem 1.5rem 4rem;}

/* Header */
.site-header{margin-bottom:2.5rem;padding-bottom:1.25rem;border-bottom:1.5px solid var(--border2);}
.site-label{font-size:11px;letter-spacing:.12em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px;}
.site-name{font-size:24px;font-weight:600;color:var(--text);}
.site-sub{font-size:12px;color:var(--text3);margin-top:4px;}

/* Section */
.section-heading{font-size:10px;letter-spacing:.1em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:.75rem;margin-top:2rem;}

/* Nav cards */
.nav-grid{display:flex;flex-direction:column;gap:8px;}
.nav-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;text-decoration:none;color:var(--text);transition:background .15s,border-color .15s;}
.nav-card:hover{background:var(--surface2);border-color:var(--border2);}
.nav-card.disabled{opacity:.45;pointer-events:none;cursor:default;}
.nav-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.nav-body{flex:1;}
.nav-title{font-size:14px;font-weight:500;color:var(--text);}
.nav-desc{font-size:12px;color:var(--text3);margin-top:2px;}
.nav-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;border:1px solid;white-space:nowrap;flex-shrink:0;}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border);}
.badge-gray{background:var(--surface2);color:var(--text2);border-color:var(--border2);}
.badge-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
.nav-arrow{font-size:12px;color:var(--text3);flex-shrink:0;margin-left:4px;}

/* Footer */
.footer{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}

@media(max-width:480px){
  .page{padding:1.5rem .75rem 3rem;}
  .site-name{font-size:20px;}
}
</style>
</head>
<body>
<div class="page">

  <div class="site-header">
    <div class="site-label">UKANOWA / 岡崎仁志</div>
    <div class="site-name">うかのわ 経営ダッシュボード</div>
    <div class="site-sub">愛媛県松山市 / 有機米農家 / 経営面積 12→30ha</div>
  </div>

  <div class="section-heading">DASHBOARDS — 管理画面一覧</div>
  <div class="nav-grid">

    <a href="keiei.html" class="nav-card">
      <div class="nav-icon" style="background:#E8F4E8;">📊</div>
      <div class="nav-body">
        <div class="nav-title">経営管理・戦略</div>
        <div class="nav-desc">融資計画・補助申請・設備投資・輸出・法人化</div>
      </div>
      <span class="nav-badge badge-amber">進行中</span>
      <span class="nav-arrow">›</span>
    </a>

    <a href="seisan.html" class="nav-card disabled">
      <div class="nav-icon" style="background:#E8F5F0;">🌾</div>
      <div class="nav-body">
        <div class="nav-title">生産管理</div>
        <div class="nav-desc">圃場・作付け・収量・品質管理</div>
      </div>
      <span class="nav-badge badge-gray">準備中</span>
      <span class="nav-arrow">›</span>
    </a>

    <a href="hanbai.html" class="nav-card disabled">
      <div class="nav-icon" style="background:#FDF3E0;">🛒</div>
      <div class="nav-body">
        <div class="nav-title">販売・業務管理</div>
        <div class="nav-desc">直販・卸・注文管理・予約</div>
      </div>
      <span class="nav-badge badge-gray">準備中</span>
      <span class="nav-arrow">›</span>
    </a>

    <a href="yushutsu.html" class="nav-card disabled">
      <div class="nav-icon" style="background:#E8F0FC;">✈️</div>
      <div class="nav-body">
        <div class="nav-title">輸出</div>
        <div class="nav-desc">香港・台湾向け有機JAS米 輸出計画</div>
      </div>
      <span class="nav-badge badge-gray">準備中</span>
      <span class="nav-arrow">›</span>
    </a>

  </div>

  <div class="footer">
    うかのわ / 愛媛県松山市久米窪田町294-1 / 090-2695-9411
  </div>

</div>
</body>
</html>
