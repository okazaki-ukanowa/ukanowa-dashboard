<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うかのわ ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE6;
  --border: #E2DDD5; --border2: #CCC8C0;
  --text: #1A1816; --text2: #6B6560; --text3: #9B958E;
  --green-bg: #E8F4E8; --green-text: #2D6A2D; --green-border: #A8D4A8;
  --amber-bg: #FDF3E0; --amber-text: #8A5C00; --amber-border: #F0CC80;
  --red-bg: #FDE8E8; --red-text: #8A2020; --red-border: #F0A8A8;
  --blue-bg: #E8F0FC; --blue-text: #1A4A9A; --blue-border: #A8C0F0;
  --accent: #2D6A2D; --radius: 8px; --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
.page { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
.site-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.75rem; padding-bottom: 1rem; border-bottom: 1.5px solid var(--border2); }
.site-title { font-size: 11px; letter-spacing: 0.12em; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.site-name { font-size: 20px; font-weight: 600; color: var(--text); }
.updated { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.section-heading { font-size: 10px; letter-spacing: 0.1em; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 0.75rem; margin-top: 1.75rem; }
.pj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.pj-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.25rem 1rem; display: flex; flex-direction: column; gap: 8px; transition: box-shadow 0.15s; }
.pj-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.pj-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pj-name { font-size: 15px; font-weight: 600; color: var(--text); }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; border: 1px solid; white-space: nowrap; }
.badge-green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
.badge-amber { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
.badge-blue  { background: var(--blue-bg);  color: var(--blue-text);  border-color: var(--blue-border); }
.badge-red   { background: var(--red-bg);   color: var(--red-text);   border-color: var(--red-border); }
.badge-gray  { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
.pj-next { font-size: 12px; color: var(--text2); line-height: 1.55; flex: 1; }
.pj-blocker { font-size: 11px; color: var(--red-text); background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 4px 8px; line-height: 1.5; }
.pj-card-footer { display: flex; justify-content: flex-end; padding-top: 4px; border-top: 1px solid var(--border); margin-top: 4px; }
.btn-open { font-size: 11px; font-family: 'DM Mono', monospace; border: 1px solid var(--border2); border-radius: var(--radius); padding: 3px 10px; background: var(--surface2); color: var(--text2); text-decoration: none; transition: background 0.15s; }
.btn-open:hover { background: var(--border); }
.loading { display: flex; align-items: center; gap: 12px; padding: 2rem; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 12px; }
.spinner { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--accent); animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { padding: 1.25rem 1.5rem; background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius-lg); color: var(--red-text); font-size: 13px; line-height: 1.6; }
.footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
@media (max-width: 480px) {
  .page { padding: 1rem 0.75rem 3rem; }
  .site-name { font-size: 17px; }
  .pj-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">
  <div class="site-header">
    <div>
      <div class="site-title">UKANOWA / 岡崎仁志</div>
      <div class="site-name">ダッシュボード</div>
    </div>
    <div class="updated" id="updated-date">更新日: —</div>
  </div>

  <div class="section-heading">PROJECTS — プロジェクト一覧</div>
  <div id="pj-container">
    <div class="loading"><div class="spinner"></div><span>Notionからデータを取得中...</span></div>
  </div>

  <div class="footer">
    <span>うかのわ / 愛媛県松山市久米窪田町294-1 / 090-2695-9411</span>
  </div>
</div>

<script>
const WORKER = 'https://ukanowa-api.commonground-oka.workers.dev';

const PJ_LIST = [
  { key: '引き継ぎ管理', file: 'hikitsugi.html' },
  { key: '経営管理',     file: 'keiei.html' },
  { key: 'システム開発', file: 'system.html' },
  { key: '生産管理',     file: 'seisan.html' },
  { key: '販売・業務管理', file: 'hanbai.html' },
  { key: '輸出',         file: 'yushutsu.html' },
  { key: '経理',         file: 'keiri.html' },
];

const BADGE_CLASS = {
  '🔥進行中': 'badge-amber',
  '進行中':   'badge-amber',
  '完了':     'badge-green',
  '待機':     'badge-blue',
  '停止':     'badge-red',
};

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function buildCard(pj, data) {
  const status   = data.status  || '';
  const next     = data.next_action || '';
  const blocker  = data.blocker || '';
  const badgeCls = BADGE_CLASS[status] || 'badge-gray';

  const nextLines = next.split('\n').filter(l => l.trim()).slice(0, 3).join(' ／ ');

  const blockerHTML = blocker
    ? '<div class="pj-blocker">🚧 ' + esc(blocker) + '</div>'
    : '';

  return '<div class="pj-card">'
    + '<div class="pj-card-top">'
    + '<span class="pj-name">' + esc(pj.key) + '</span>'
    + '<span class="badge ' + badgeCls + '">' + esc(status) + '</span>'
    + '</div>'
    + blockerHTML
    + '<p class="pj-next">' + esc(nextLines || '—') + '</p>'
    + '<div class="pj-card-footer">'
    + '<a href="' + pj.file + '" class="btn-open">開く →</a>'
    + '</div>'
    + '</div>';
}

async function init() {
  document.getElementById('updated-date').textContent =
    '更新日: ' + new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

  const container = document.getElementById('pj-container');

  try {
    const results = await Promise.all(
      PJ_LIST.map(pj =>
        fetch(WORKER + '/context?pj=' + encodeURIComponent(pj.key))
          .then(r => r.ok ? r.json() : { status: '', next_action: '', blocker: '' })
          .catch(() => ({ status: '', next_action: '', blocker: '' }))
      )
    );

    const html = PJ_LIST.map((pj, i) => buildCard(pj, results[i])).join('');
    container.innerHTML = '<div class="pj-grid">' + html + '</div>';
  } catch (e) {
    container.innerHTML = '<div class="error-msg">取得失敗: ' + esc(e.message) + '</div>';
  }
}

init();
</script>
</body>
</html>
