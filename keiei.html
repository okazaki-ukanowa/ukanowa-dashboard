<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うかのわ 経営管理・戦略ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD5;--border2:#CCC8C0;
  --text:#1A1816;--text2:#6B6560;--text3:#9B958E;
  --green-bg:#E8F4E8;--green-text:#2D6A2D;--green-border:#A8D4A8;
  --amber-bg:#FDF3E0;--amber-text:#8A5C00;--amber-border:#F0CC80;
  --red-bg:#FDE8E8;--red-text:#8A2020;--red-border:#F0A8A8;
  --blue-bg:#E8F0FC;--blue-text:#1A4A9A;--blue-border:#A8C0F0;
  --accent:#2D6A2D;--radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.page{max-width:960px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.site-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.75rem;padding-bottom:1rem;border-bottom:1.5px solid var(--border2);}
.site-title{font-size:11px;letter-spacing:.12em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px;}
.site-name{font-size:20px;font-weight:600;color:var(--text);}
.header-right{text-align:right;}
.updated{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.btn-print{margin-top:6px;display:inline-block;font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--border2);border-radius:var(--radius);padding:4px 10px;background:var(--surface);color:var(--text2);cursor:pointer;transition:background .15s;}
.btn-print:hover{background:var(--surface2);}
.btn-top{display:inline-block;font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--border2);border-radius:var(--radius);padding:4px 10px;background:var(--surface);color:var(--text2);text-decoration:none;transition:background .15s;margin-top:6px;margin-right:4px;}
.btn-top:hover{background:var(--surface2);}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.75rem;}
.met{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1rem;}
.met-label{font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:4px;}
.met-value{font-size:22px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;}
.met-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.section-heading{font-size:10px;letter-spacing:.1em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:.75rem;margin-top:1.75rem;}
.themes{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.card-header{display:flex;align-items:center;gap:10px;padding:.875rem 1rem;cursor:pointer;transition:background .15s;user-select:none;}
.card-header:hover{background:var(--surface2);}
.card-num{width:26px;height:26px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;font-family:'DM Mono',monospace;}
.card-title{font-size:14px;font-weight:500;flex:1;}
.card-progress{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:4px;}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;border:1px solid;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border);}
.badge-blue{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border);}
.badge-gray{background:var(--surface2);color:var(--text2);border-color:var(--border2);}
.chevron{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.card.open .chevron{transform:rotate(180deg);}
.card-body{display:none;border-top:1px solid var(--border);padding:.875rem 1rem 1rem;}
.card.open .card-body{display:block;}
.card-cols{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1rem;}
.col-label{font-size:10px;letter-spacing:.08em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:.5rem;font-weight:500;}
.confirmed-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
.confirmed-list li{font-size:13px;color:var(--text2);padding:7px 10px;background:var(--surface2);border-radius:var(--radius);line-height:1.55;}
.action-list{display:flex;flex-direction:column;gap:5px;}
.action-item{display:flex;align-items:flex-start;gap:8px;background:var(--surface2);border-radius:var(--radius);padding:7px 10px;cursor:pointer;transition:background .15s;position:relative;}
.action-item:hover{background:var(--border);}
.action-item.done{opacity:.45;}
.action-item.done .action-text{text-decoration:line-through;}
.action-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.action-item.done .action-check{background:var(--accent);border-color:var(--accent);}
.action-item.done .action-check::after{content:'✓';color:white;font-size:10px;font-weight:600;}
.action-num{font-size:10px;font-weight:500;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0;margin-top:2px;min-width:16px;}
.action-text{font-size:13px;color:var(--text);line-height:1.5;flex:1;}
body.hide-done .action-item.done{display:none;}
.memo-area{margin-top:.875rem;padding-top:.875rem;border-top:1px solid var(--border);}
.memo-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:5px;}
.memo-input{width:100%;min-height:56px;resize:vertical;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:8px 10px;outline:none;transition:border .15s;line-height:1.55;}
.memo-input:focus{border-color:var(--border2);background:var(--surface);}
.memo-input::placeholder{color:var(--text3);}
.t1 .card-num{background:#E8F4E8;color:#2D6A2D;}
.t2 .card-num{background:#E8F0FC;color:#1A4A9A;}
.t3 .card-num{background:#FDF3E0;color:#8A5C00;}
.t4 .card-num{background:#F0E8FC;color:#5A1A9A;}
.t5 .card-num{background:#FCE8F0;color:#9A1A50;}
.t6 .card-num{background:#E8F5F5;color:#1A6A6A;}
.btn-reset{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:3px 10px;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.btn-reset:hover{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border);}
.btn-hide-done{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:3px 10px;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;transition:all .15s;}
.btn-hide-done:hover{background:var(--surface2);}
.btn-hide-done.active{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
.loading{display:flex;align-items:center;gap:12px;padding:2rem;color:var(--text3);font-family:'DM Mono',monospace;font-size:12px;}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-msg{padding:1.25rem 1.5rem;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius-lg);color:var(--red-text);font-size:13px;line-height:1.6;}
.error-msg button{margin-top:.75rem;padding:4px 14px;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface);border:1px solid var(--red-border);border-radius:var(--radius);color:var(--red-text);cursor:pointer;}
.footer{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;justify-content:space-between;align-items:center;}
@media(max-width:600px){.page{padding:1rem .75rem 3rem;}.site-name{font-size:17px;}.card-cols{grid-template-columns:1fr;}.metrics{grid-template-columns:repeat(2,1fr);}}
@media print{body{background:white;font-size:12px;}.btn-print,.btn-top,.btn-reset,.btn-hide-done{display:none;}.card{break-inside:avoid;border:1px solid #ccc;}.card-body{display:block!important;}.chevron{display:none;}.page{padding:1rem;}}
</style>
</head>
<body>
<div class="page">
<div class="site-header">
  <div>
    <div class="site-title">UKANOWA / 岡崎仁志</div>
    <div class="site-name">経営管理・戦略ダッシュボード</div>
  </div>
  <div class="header-right">
    <div class="updated" id="updated-date">更新日: —</div>
    <div style="margin-top:6px;">
      <a href="index.html" class="btn-top">← トップへ</a>
      <button class="btn-print" onclick="window.print()">印刷 / PDF保存</button>
    </div>
  </div>
</div>
<div class="metrics">
  <div class="met"><div class="met-label">令和7年 所得</div><div class="met-value">1,230万</div><div class="met-sub">所得率 約44%（業界平均を大幅超）</div></div>
  <div class="met"><div class="met-label">借入残高（前島除く）</div><div class="met-value">2,534万</div><div class="met-sub">年間返済 256万円</div></div>
  <div class="met"><div class="met-label">新規投資総額</div><div class="met-value">5,750万</div><div class="met-sub">倉庫4,500 + 設備自己負担1,250</div></div>
  <div class="met"><div class="met-label">経営面積</div><div class="met-value">12→30ha</div><div class="met-sub">拡大進行中（8年目）</div></div>
</div>
<div class="section-heading">THEMES — テーマ別進捗</div>
<div class="themes" id="themes-container">
  <div class="loading"><div class="spinner"></div><span>Notionからデータを取得中...</span></div>
</div>
<div class="footer">
  <span>うかのわ / 愛媛県松山市久米窪田町294-1 / 090-2695-9411</span>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn-hide-done" id="btn-hide-done" onclick="toggleHideDone()">完了を非表示</button>
    <button class="btn-reset" onclick="resetAll()">チェックをリセット</button>
  </div>
</div>
</div>
<script>
const WORKER='https://ukanowa-api.commonground-oka.workers.dev';
const PJ='経営管理';
const STORAGE_KEY='ukanowa_keiei_v2';

const STATIC_TASKS={
  '融資・資金調達':[
    '松山市農林水産振興課：②トラクター補助率1/3or1/2・20ha未満採択可否の確認',
    '公庫松山支店訪問：①スーパーL申請（6月末支払い）・②農業改良資金事前相談・③④方針確認',
    '④倉庫スーパーL（約4,911万・5年据置+20年）返済スケジュール計算',
    '4本立て融資CF表（10年）完成版・公庫訪問資料一式',
    '②農業改良資金：借入額・返済条件確定（11〜12月支払い）',
  ],
  'スマ転・補助申請':[
    '中国四国農政局：生産方式革新実施計画（スマ農法認定）事前相談',
    '今治ヤンマー・ヤンマーアグリジャパンから2社見積取得（RTK自動操舵トラクター＋RTKレベラー）',
  ],
  '輸出市場開拓':[
    'ジェトロ愛媛へ相談アポイントを取る（TEL: 089-933-2380）',
  ],
  '米加工ライン整備':[
    '③乾燥調整+冷蔵庫+精米ライン（4,000万）見積書入手・補助事業確定',
    '2社見積取得：今治ヤンマー・ヤンマーアグリジャパン',
  ],
  '税理士変更・法人化':[
    '重松修税理士事務所へ相談アポイントを取る',
    '法人化タイミングとスマ農法認定承継可否を中国四国農政局に確認',
  ],
};

const THEME_COLOR=['t1','t2','t3','t4','t5','t6'];
const NUM_CHARS=['①','②','③','④','⑤','⑥'];
const BADGE_CLASS={'進行中':'badge-amber','令和9年度目標':'badge-blue','検討中':'badge-gray','完了':'badge-green','待機':'badge-blue'};
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};}}
function setState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch{}}

function toggleCard(header){
  const card=header.closest('.card');
  card.classList.toggle('open');
  const s=getState();if(!s.open)s.open={};
  s.open[card.id]=card.classList.contains('open');
  setState(s);
}

function toggleAction(item){
  item.classList.toggle('done');
  const key=item.dataset.key;
  const s=getState();if(!s.actions)s.actions={};
  s.actions[key]=item.classList.contains('done');
  setState(s);
  updateProgress(key.split('-')[0]);
}

function saveMemo(el){
  const s=getState();if(!s.memos)s.memos={};
  s.memos[el.dataset.key]=el.value;
  setState(s);
}

function updateProgress(tid){
  const items=document.querySelectorAll(`.action-list[data-theme="${tid}"] .action-item`);
  const done=document.querySelectorAll(`.action-list[data-theme="${tid}"] .action-item.done`);
  const el=document.getElementById('prog-'+tid);
  if(el&&items.length)el.textContent=done.length+'/'+items.length;
}

function toggleHideDone(){
  const s=getState();s.hideDone=!s.hideDone;setState(s);
  applyHideDone(s.hideDone);
}
function applyHideDone(hide){
  const btn=document.getElementById('btn-hide-done');
  if(hide){document.body.classList.add('hide-done');btn.classList.add('active');btn.textContent='完了を表示';}
  else{document.body.classList.remove('hide-done');btn.classList.remove('active');btn.textContent='完了を非表示';}
}

function resetAll(){
  if(!confirm('すべてのチェックをリセットしますか？\n（メモは保持されます）'))return;
  const s=getState();s.actions={};setState(s);
  document.querySelectorAll('.action-item').forEach(el=>el.classList.remove('done'));
  for(let i=1;i<=6;i++)updateProgress(String(i));
}

function buildCard(theme,idx){
  const num=theme['番号']||(idx+1);
  const name=theme['テーマ名']||'';
  const badge=theme['ステータスバッジ']||theme['ステータス']||'';
  const confirmed=theme['確定事項']||'';
  const colorCls=THEME_COLOR[(num-1)%6];
  const numChar=NUM_CHARS[(num-1)%6];
  const badgeCls=BADGE_CLASS[badge]||'badge-gray';
  const tid=String(num);

  const confirmedHTML=confirmed
    ?confirmed.split('\n').filter(l=>l.trim())
      .map(l=>'<li>'+esc(l.replace(/^[・\-]\s*/,'').trim())+'</li>').join('')
    :'<li style="color:var(--text3);font-size:12px;">（未設定）</li>';

  const tasks=STATIC_TASKS[name]||[];
  const actionsHTML=tasks.length
    ?tasks.map((t,i)=>{
        const key=tid+'-'+(i+1);
        return '<div class="action-item" onclick="toggleAction(this)" data-key="'+esc(key)+'">'
          +'<div class="action-check"></div>'
          +'<span class="action-num">'+String(i+1).padStart(2,'0')+'</span>'
          +'<span class="action-text">'+esc(t)+'</span>'
          +'</div>';
      }).join('')
    :'<p style="font-size:12px;color:var(--text3);padding:4px 0;">タスクなし</p>';

  return '<div class="card '+colorCls+'" id="card-'+tid+'">'
    +'<div class="card-header" onclick="toggleCard(this)">'
    +'<div class="card-num">'+numChar+'</div>'
    +'<span class="card-title">'+esc(name)+'</span>'
    +'<span class="card-progress" id="prog-'+tid+'"></span>'
    +'<span class="badge '+badgeCls+'">'+esc(badge)+'</span>'
    +'<span class="chevron">▼</span>'
    +'</div>'
    +'<div class="card-body">'
    +'<div class="card-cols">'
    +'<div><div class="col-label">CONFIRMED — 確定事項</div><ul class="confirmed-list">'+confirmedHTML+'</ul></div>'
    +'<div><div class="col-label">NEXT ACTIONS</div><div class="action-list" data-theme="'+tid+'">'+actionsHTML+'</div></div>'
    +'</div>'
    +'<div class="memo-area"><div class="memo-label">MEMO</div>'
    +'<textarea class="memo-input" placeholder="メモを入力..." data-key="memo-'+tid+'" oninput="saveMemo(this)"></textarea>'
    +'</div></div></div>';
}

async function init(){
  document.getElementById('updated-date').textContent='更新日: '+new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  const container=document.getElementById('themes-container');
  try{
    const res=await fetch(WORKER+'/themes?pj='+encodeURIComponent(PJ));
    if(!res.ok)throw new Error('取得エラー: '+res.status);
    const data=await res.json();
    if(!data.themes||data.themes.length===0){
      container.innerHTML='<p style="color:var(--text3);font-size:13px;padding:1rem 0;">テーマがまだ登録されていません。</p>';
      return;
    }
    const sorted=[...data.themes].sort((a,b)=>(a['番号']||99)-(b['番号']||99));
    container.innerHTML=sorted.map((t,i)=>buildCard(t,i)).join('');
    restoreState();
  }catch(e){
    container.innerHTML='<div class="error-msg">データ取得に失敗しました<br><small>'+esc(e.message)+'</small><br><button onclick="init()">再試行</button></div>';
  }
}

function restoreState(){
  const s=getState();
  if(s.open)Object.entries(s.open).forEach(([id,open])=>{
    const c=document.getElementById(id);if(c&&open)c.classList.add('open');
  });
  if(s.actions)Object.entries(s.actions).forEach(([key,done])=>{
    const el=document.querySelector('.action-item[data-key="'+key+'"]');if(el&&done)el.classList.add('done');
  });
  if(s.memos)Object.entries(s.memos).forEach(([key,val])=>{
    const el=document.querySelector('.memo-input[data-key="'+key+'"]');if(el)el.value=val;
  });
  for(let i=1;i<=6;i++)updateProgress(String(i));
  if(s.hideDone)applyHideDone(true);
}

init();
</script>
</body>
</html>
